<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Cadastro</title>
    <link rel="stylesheet" href="aula01_estilo.css">
</head>

<body>

    <div class="div_principal">

        <div class="div_cabecalho">
            <h1>Formulário de Cadastro</h1>
            <p>Preencha os campos abaixo para criar sua conta.</p>
        </div>

        <div class="container">
          <form id="formulario-cadastro" action="#" method="POST">   

                <p class="form-section-title">Dados pessoais</p>

                <div class="form-group">
                    <label for="nome">Nome completo <span class="required">*</span></label>
                    <input type="text" id="nome" name="nome" placeholder="Ex: João da Silva" autocomplete="name">
                    <div class="field-error" id="erro-nome"></div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="email">E-mail <span class="required">*</span></label>
                        <input type="email" id="email" name="email" placeholder="seu@email.com" autocomplete="email">
                        <div class="field-error" id="erro-email"></div>
                    </div>
                    <div class="form-group">
                        <label for="senha">Senha <span class="required">*</span></label>
                        <input type="password" id="senha" name="senha" placeholder="Mín. 6 caracteres" autocomplete="new-password">
                        <div class="field-error" id="erro-senha"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="cidade">Cidade <span class="required">*</span></label>
                    <select id="cidade" name="cidade">
                        <option value="">Selecione sua cidade...</option>
                        <option value="Florianópolis">Florianópolis</option>
                        <option value="Blumenau">Blumenau</option>
                        <option value="Joinville">Joinville</option>
                        <option value="Chapecó">Chapecó</option>
                        <option value="Chapecó" selected>Timbó</option>
                    </select>
                    <div class="field-error" id="erro-cidade"></div>
                </div>

                <hr class="divider">
                <p class="form-section-title">Preferências</p>

                <div class="form-group">
                    <label>Sexo <span class="required">*</span></label>
                    <div class="radio-group">
                        <label class="radio-item">
                            <input type="radio" name="sexo" value="Masculino"> Masculino
                        </label>
                        <label class="radio-item">
                            <input type="radio" name="sexo" value="Feminino"> Feminino
                        </label>
                    </div>
                    <div class="field-error" id="erro-sexo"></div>
                </div>

                <div class="form-group">
                    <label>Interesses <span class="required">*</span></label>
                    <div class="checkbox-group">
                        <label class="checkbox-item">
                            <input type="checkbox" name="interesse" value="HTML"> HTML
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" name="interesse" value="CSS"> CSS
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" name="interesse" value="JavaScript"> JavaScript
                        </label>
                    </div>
                    <div class="field-error" id="erro-interesse"></div>
                </div>

                <div class="form-group">
                    <label for="observacao">Observações</label>
                    <textarea id="observacao" name="observacao" placeholder="Alguma informação adicional..."></textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Cadastrar</button>
                    <button type="reset" class="btn btn-secondary">Limpar</button>
                </div>

                <div class="success-banner" id="success-banner"></div>
            <input type="hidden" name="_subject" value="Novo Cadastro">
            <input type="hidden" name="_captcha" value="false">
            </form>
        </div>

    </div>

    <script src="aula01_acao.js"></script>
</body>

</html>
