<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Cliente</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .form-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }

        input:focus {
            border-color: #007bff;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            border: none;
            border-radius: 4px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #0056b3;
        }

        #mensagem {
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
            color: green;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>Cadastro de Cliente</h2>
        <form id="formCadastro">
            <div class="input-group">
                <label for="nome">Nome</label>
                <input type="text" id="nome" required placeholder="Seu nome completo">
            </div>

            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" required placeholder="seu.email@exemplo.com">
            </div>

            <div class="input-group">
                <label for="cidade">Cidade</label>
                <input type="text" id="cidade" required placeholder="Sua cidade">
            </div>

            <button type="submit">Cadastrar</button>
        </form>
        <p id="mensagem"></p>
    </div>

    <script>
        // Seleciona o formulário e o parágrafo de mensagem
        const form = document.getElementById('formCadastro');
        const mensagem = document.getElementById('mensagem');

        // Escuta o evento de clique no botão "Cadastrar"
        form.addEventListener('submit', function(event) {
            event.preventDefault(); // Evita que a página seja recarregada

            // Captura os valores digitados nos campos
            const nome = document.getElementById('nome').value;
            const email = document.getElementById('email').value;
            const cidade = document.getElementById('cidade').value;

            // Simula o envio de dados (pode ser substituído por envio a um banco de dados no futuro)
            console.log("Cliente Cadastrado:", { nome, email, cidade });

            // Exibe a mensagem de sucesso na tela
            mensagem.textContent = `Cliente ${nome} cadastrado com sucesso!`;

            // Limpa os campos do formulário
            form.reset();
        });
    </script>

</body>
</html>
