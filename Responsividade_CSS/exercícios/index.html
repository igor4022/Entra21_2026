<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="login_psicodelico.css">
    <link rel="stylesheet" href="../tema_psicodelico.css">
</head>
<body>
    <h1>Faça o login</h1>
    <form class="login" action="html/conteudo.html">
        <label for="nome">Nome</label>
        <input type="text" name="nome" id="nome" placeholder="Seu nome completo" required><br>
        <label for="email">E-mail</label>
        <input type="email" name="email" id="email" placeholder="seu@email.com" required><br>
        <button type="submit">Entrar</button>
    </form>
</body>
<script type="module" src="script.js"></script>
</html>
