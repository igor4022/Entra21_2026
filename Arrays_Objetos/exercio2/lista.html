<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <input type="text" name="nome" id="nome" placeholder="Nome" required>
    <input type="text" name="idade" id="idade" placeholder="Idade" required>
    <input type="text" name="curso" id="curso" placeholder="Curso" required>
    <input type="text" name="nota" id="nota" placeholder="Nota Final" required><br>
    <input type="submit" value="Cadastrar" id="enviar">
    <section>
        <div class="nome">
            <p class="">Nome</p>
        </div>
        <div class="idade">
            <p>Idade</p>
        </div>
        <div class="curso">
            <p>Curso</p>
        </div>
        <div class="nota">
            <p>Nota Final</p>
        </div>
    </section>
</body>
<script src="script.js"></script>
</html>
