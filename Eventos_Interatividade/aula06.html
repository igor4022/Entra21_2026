<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 6 - Eventos e Interatividade</title>
    <link rel="stylesheet" href="aula06.css">
</head>
<body>
    <header>
        <h1>Eventos e Interatividade</h1>
        <p>Praticando eventos JavaScript</p>
    </header>
    <main>
        <section class="card">
            <h2>Formulário com Validação</h2>
            <form id="formCadastro">
                <label>Nome:</label>
                <input type="text" id="nome" placeholder="Digite seu nome">
                <label>E-mail:</label>
                <input type="email" id="email" placeholder="Digite seu e-mail">
                <button type="submit">
                    Cadastrar
                </button>
            </form>
            <p id="mensagem"></p>
        </section>
        <section class="card">
            <h2>Contador Interativo</h2>
            <h3 id="contador">0</h3>
            <button id="btnMais">+</button>
            <button id="btnMenos">-</button>
        </section>
        <section class="card">
            <h2>Troca de Tema</h2>
            <button id="btnTema">
                Alternar Tema
            </button>
        </section>
        <section class="card">
            <h2>Eventos Mouseover e Keydown</h2>
            <div id="caixa">
                Passe o mouse aqui
            </div>
            <br>
            <input type="text" id="teclado" placeholder="Digite algo">
            <p id="saidaTecla"></p>
        </section>
    </main>

    <div id="resultado"></div>
    
    <script src="aula06.js"></script>
</body>
</html>
