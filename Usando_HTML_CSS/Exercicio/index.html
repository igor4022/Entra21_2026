<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form method="POST" action="cadastro.java" class="formulario">
        <label class="formes"  for="nome">Nome</label>
        <input class="formes" type="text" name="nome" id="nome" required><br>
        <label class="formes" for="email">E-mail</label>
        <input class="formes" type="email" name="email" id="email" required><br>
        <input class="envio" type="submit" value="enviar">
    </form>
    <script src="script.js"></script>
</body>
</html>
