<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="texto">
        <h1 class="titulos">Texto</h1>
        <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Beatae suscipit excepturi possimus earum rerum, commodi neque soluta expedita est, omnis laboriosam libero laborum quis mollitia facere, explicabo tempora qui incidunt!</p>
        <img src="./imagens/image.png" class="imagem">
    </div>
    <form method="POST" action="cadastro.java" class="formulario">
        <label class="formes"  for="nome">Nome</label>
        <input class="formes" type="text" name="nome" id="nome" value="nome" required><br>
        <label class="formes" for="email">E-mail</label>
        <input class="formes" type="email" name="email" id="email" value="email" required><br>
        <input class="envio" type="reset" value="apagar">
        <input class="envio" type="submit" value="enviar">
    </form>
    <script src="script.js"></script>
</body>
</html>
